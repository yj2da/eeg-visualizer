<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEG MI Games</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 메인 메뉴 화면 -->
        <div id="main-menu" class="screen">
            <h1>EEG Brain Games</h1>
            <p class="subtitle">모터 이메지너리 훈련 및 게임</p>
            
            <div class="slider-container">
                <div class="slider">
                    <div class="card" onclick="app.startSimulator()">
                        <div class="card-icon">🤚</div>
                        <h2>기본 시뮬레이터</h2>
                        <p>왼손/오른손 들기 시각화 테스트</p>
                    </div>
                    <div class="card" onclick="app.startZeroGame()">
                        <div class="card-icon">⚡</div>
                        <h2>제로 게임 (O/X)</h2>
                        <p>왼손(Yes) / 오른손(No) 순발력 퀴즈</p>
                    </div>
                    <div class="card disabled">
                        <div class="card-icon">🏃</div>
                        <h2>좌우 피하기</h2>
                        <p>Coming Soon...</p>
                    </div>
                </div>
            </div>
            <p class="instruction">카드를 클릭하여 게임을 시작하세요</p>
        </div>

        <!-- 게임 실행 화면 -->
        <div id="game-screen" class="screen hidden">
            <button class="back-btn" onclick="app.goHome()">← 홈으로</button>
            
            <!-- 시뮬레이터 레이아웃 -->
            <div id="simulator-ui" class="game-ui hidden">
                <h2>EEG Motor Imagery Simulator</h2>
                <div class="visualizer">
                    <div id="sim-left" class="hand">
                        <span class="emoji">🤚</span>
                        <span class="label">Left (Yes)</span>
                    </div>
                    <div id="sim-right" class="hand">
                        <span class="emoji">🤚</span>
                        <span class="label">Right (No)</span>
                    </div>
                </div>
                <div id="sim-status" class="status-box">대기 중...</div>
            </div>

            <!-- 제로 게임 레이아웃 -->
            <div id="zero-game-ui" class="game-ui hidden">
                <div class="game-header">
                    <div class="score">Score: <span id="zero-score">0</span></div>
                    <div class="timer"><div id="timer-bar"></div></div>
                </div>
                <div id="zero-question" class="question-box">준비!</div>
                <div class="zero-visualizer">
                    <div id="zero-left" class="hand-small">
                        <span class="emoji-small">🤚</span>
                        <span class="label-small">Left (Yes)</span>
                    </div>
                    <div id="zero-right" class="hand-small">
                        <span class="emoji-small">🤚</span>
                        <span class="label-small">Right (No)</span>
                    </div>
                </div>
                <div id="zero-feedback" class="feedback-text"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
